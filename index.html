<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="display">0</div>
    <div id="numbers">
      <button>.</button>
      <button>0</button>
      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>7</button>
      <button>8</button>
      <button>9</button>
    </div>
    <div id="operators">
      <button id="add">+</button>
      <button id="substract">-</button>
      <button id="multiply">x</button>
      <button id="divide">/</button>
    </div>
    <button id="operate">=</button>
    <button id="clear">clear</button>
  </body>
</html>
