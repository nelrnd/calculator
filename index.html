<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="calculator">
      <div id="display">0</div>
      <div class="flex">
        <div class="main">
          <button id="clear">AC</button>
          <button id="back">
            <img src="back.svg" alt="backspace">
          </button>
          <button id="pos-neg">+/-</button>
          <div id="numbers">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="span-2">0</button>
            <button id="dot">.</button>
          </div>
        </div>
        <div class="pannel">
          <div id="operators">
            <button>+</button>
            <button>-</button>
            <button>x</button>
            <button>÷</button>
          </div>
          <button id="operate">=</button>
        </div>
      </div>
    </div>
  </body>
</html>
